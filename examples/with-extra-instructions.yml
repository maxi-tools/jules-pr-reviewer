name: Jules PR Review (project rules)
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      statuses: write
    steps:
      - uses: thalesraymond/jules-pr-reviewer@v1
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          extra_instructions: |
            This repo is a Node/TypeScript service.

            Blocking rules specific to this codebase:
            - Any direct DB write outside `src/repositories/` is BLOCKING.
            - Logging of request bodies without `redactSecrets()` is BLOCKING.
            - Missing `await` on a returned Promise in an async handler is BLOCKING.

            Soft rules:
            - Prefer named exports — raise as NIT if default export.
            - New public functions without JSDoc — raise as WARN.
