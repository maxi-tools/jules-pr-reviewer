name: Jules PR Review (label-gated)
on:
  pull_request:
    types: [labeled, synchronize]

jobs:
  review:
    if: contains(github.event.pull_request.labels.*.name, 'jules-review')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      statuses: write
    steps:
      - uses: sanjay3290/jules-pr-reviewer@v1
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
